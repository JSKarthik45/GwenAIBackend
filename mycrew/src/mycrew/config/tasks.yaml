debug_runtime_logic:
  description: >-
   0. CONTEXT ISOLATION RULE: Do not look at previous task outputs. Use only file_reader results from current disk state.
     Audit files as they exist now, not how they were built.
   1. Use 'file_reader' to scan files one at a time only. Do not batch reads.
   2. You are strictly forbidden from outputting more than ONE tool call per response.
     You must never use a JSON array for tool calls.
     If you need to fix three files, fix the first one, wait for SUCCESS, and only then proceed to the next in a separate turn.
   3. Start by calling file_reader for src/HomeContent.js only.
     Read it, analyze it, and if it needs a fix, call file_writer.
     Only after HomeContent.js is fully verified and fixed may you move to src/SettingsContent.js.
   4. CROSS-CHECK IMPORTS: For every local import, verify the target file exists and the export type (Named vs Default) matches the import style. This prevents unresolved imports.
   4.0 ZERO MODULE RESOLUTION ERRORS GUARANTEE:
      - You MUST read EVERY SINGLE file imported locally by HomeContent.js and SettingsContent.js using file_reader.
      - Verify the file ACTUALLY exists. If not, create it.
      - Verify the export type EXACTLY matches. If the file has 'export default Button', the import MUST be 'import Button from ...'. If it has 'export const Button', the import MUST be 'import { Button } from ...'.
      - Ensure NO absolute local imports (e.g., 'src/Button'). Rewrite them to relative paths (e.g., './Button').
   4.0.1 CHECK BUTTONS & CRASHES: Verify all buttons have valid onPress handlers. Add optional chaining (?.) to prevent app crashes when accessing nested data. Ensure UI has adequate padding and doesn't look bad.
   4.0.2 REACT NATIVE STRICTNESS: Scan for and fix any bare text outside of <Text> tags. Scan for and fix any invalid style values like '10px' to just 10.
   4.0.3 JSX SYNTAX VERIFICATION: Thoroughly scan the file for unclosed JSX braces (e.g. `prop={value />` instead of `prop={value} />`) and unclosed tags. Fix any syntax errors immediately.
   4.1 If HomeContent or SettingsContent imports a utils/shared file, read that file and confirm the imported names exist.
   4.2 If a file imports @react-native-async-storage/async-storage, verify it is required by the prompt; if not, remove storage usage.
   4.3 Scan for syntax errors (e.g., stray semicolons after JSX blocks) and fix them in-place.
   4.4 Replace any Picker usage with Pressable/Switch/Button controls.
   4.5 Remove placeholder comments or TODOs in generated code.
   4.6 Remove any third-party library imports (moment/date-fns/dayjs) and refactor to plain JS.
    4.7 If Home/Settings content does not match the current prompt domain, replace it with prompt-specific content.
    4.8 Remove any template placeholder copy from Home/Settings content.
    4.9 Replace Text-as-button interactions with Pressable or Button.
    4.10 Replace empty useEffect blocks or stub handlers with real logic or remove them.
   5. FIX PATHS: If an import says '../styles' but the file is actually at './styles', rewrite the file with the correct relative path.
   6. ADD IDs: Ensure any 'add' or 'create' functions (e.g., 'createTask') include a unique ID: 'id: Date.now().toString()'.
   7. EXECUTE REPAIRS: If any of these bugs are found, use 'file_writer' to overwrite the specific file with the corrected code.
   8. NO HALLUCINATED FUNCTIONS RULE: Do not use placeholder functions like loadTodoItemsFromStorage().
     If a function is needed, it must be explicitly defined in the code you write.
   9. NO-NARRATIVE RULE: You must NOT provide narrative, headers, step lists, or explanations.
     Your first response MUST be a file_reader tool call to inspect the codebase.
   10. MANDATORY REPAIR RULE: If you find any logic/runtime bug (including missing IDs, path mismatches, missing exports, or import/export contract mismatch),
     you MUST call file_writer immediately to patch the affected file. Do not only describe the bug.
   11. NO BATCHING RULE: You are strictly forbidden from calling a tool more than once per response.
     If multiple files are needed, handle exactly one file per response and wait for success before the next file.
   12. COMPLETE JSON RULE: When calling file_writer, provide the full valid payload including the target path and the complete file content.
     Never emit a shorthand path, bracketed filename, or partial tool argument.
   13. STRICT COMPLETION RULE: Return 'DONE' only after physically verifying files and applying required patches.
     Any text-only response without tool calls is a FAILURE.
  expected_output: >-
    A crash-free codebase. All imports are resolved, and all list items have IDs.
    Return 'DONE' only after all identified bugs are patched and all required verification/repair tool calls have been executed.
  agent: react_native_debugger
  context: []

