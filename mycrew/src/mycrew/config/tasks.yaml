plan_requirements:
  description: >
    From the user's prompt ({content_prompt}), extract ONLY the minimum features for a first Expo mobile MVP.
    Constraints:
    - React Native + Expo SDK 54
    - Prefer single-screen flow
    - No navigation setup unless explicitly required by prompt
    - No backend/auth unless explicitly required
    - Minimize external libraries
  expected_output: >
    Short MVP brief with 2-4 core features, one mobile user flow, and explicit out-of-scope items.
    Mention that navigation and advanced integrations are out of scope unless explicitly requested.
  agent: planner

design_architecture:
  description: >
    Design a strict MINIMAL architecture for Expo React Native JSX implementation.
    Hard constraints:
    - 2-3 files maximum under src/
    - Prefer one main file + up to 2 tiny reusable components
    - No navigation folders/routes/tabs/stacks unless explicitly required
    - No Redux/MobX/Zustand/sagas or complex patterns
    - Default to zero external libraries
    - If an external library is unavoidable, list it explicitly with one short reason
    REQUIRED OUTPUT FORMAT:
    architecture_summary: <short paragraph>
    external_dependencies: <list, empty if none>
    files:
      - path:
        purpose:
        exports:
        state_props:
        handlers:
        allowed_imports:
    allowed_imports is authoritative and will be used as a strict contract by implementation.
  expected_output: >
    Strict architecture blueprint with 2-3 src files max, explicit per-file allowed_imports,
    and empty/minimal external_dependencies.
  agent: architect
  context: [plan_requirements]

implement_mvp_features:
  description: >
    Implement exactly the architecture blueprint.
    Hard rules:
    - Create ONLY files listed in architecture.files
    - JSX only (no TypeScript/TSX)
    - For each file, use ONLY imports listed in that file's allowed_imports
    - Do not add navigation setup or extra screens unless architecture explicitly includes them
    - Keep each file concise and Expo Go compatible
    - No placeholders, no TODOs
    Tool usage:
    1) Use file_writer for one file at a time
    2) Use file_reader only when required
    3) Use track_dependency ONLY for packages in architecture.external_dependencies
    4) Do not output full code in normal chat text
    Final response after all tool calls must be exactly: DONE
  expected_output: >
    Implemented files match architecture exactly (2-3 files target), imports follow per-file allowlists,
    dependencies tracked only if explicitly approved, final response exactly DONE.
  agent: feature_builder
  context: [design_architecture]

