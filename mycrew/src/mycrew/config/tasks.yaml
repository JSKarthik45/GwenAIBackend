plan_requirements:
  description: >
    From the user prompt ({content_prompt}), extract 3-5 features for a SINGLE-PAGE Expo React Native app.
    Constraints:
    - React Native + Expo SDK 54, JSX only
    - ONE screen only (src/Content.js). NO navigation, NO tabs, NO routing.
    - App.js is a prebuilt shell with SafeAreaView + header. It imports and renders src/Content.js.
    - Focus on what Content.js should display and do
    - Target 3-5 concrete, achievable features
    - NO backend, NO auth, NO external APIs
    - Use ONLY react and react-native built-ins
    - Do NOT add persistence unless the prompt explicitly asks for it
    - For data features, plan full CRUD (Create, Read, Update, Delete)
    REQUIRED OUTPUT:
    feature_plan:
      - feature_name:
        priority: P1
        description: what the feature does
        ui_elements: buttons, inputs, lists needed
        state: what useState hooks are needed
        handlers: what functions are needed
  expected_output: >
    A feature plan with 3-5 features for a single-page app.
    Each feature has clear UI elements, state, and handlers defined.
  agent: planner

build_app:
  description: >
    Build the entire single-page app based on the feature plan.
    You MUST write src/Content.js as the main (and usually only) file.
    If you need helper utilities, put them in src/ as separate files (e.g. src/helpers.js).
    Target 1-3 total files. Keep it simple.
    Hard rules:
    - JSX only (no TypeScript)
    - All files go directly in src/ (NO subfolders)
    - ALL local imports MUST use ./ relative paths (e.g. ./helpers)
    - NEVER use src/... or ../ in imports
    - NEVER include .js extension in imports
    - Use ONLY react and react-native modules
    - MUST NOT edit App.js or index.js
    - NO mock data. Wire all UI to real React state.
    - Every button must have a working onPress handler
    - Never place raw text outside a Text component
    - Use numeric style values (10, not '10px')
    - Clean, professional, minimalist UI
    Tool usage:
    1) One file_writer call per response
    2) Wait for SUCCESS before writing next file
    3) First response MUST be a file_writer call
    4) No narrative text, no markdown, no code fences
    5) Keep files under 120 lines
    Required writes: src/Content.js (plus any helper files it imports)
    Final response after all files written: DONE
  expected_output: >
    All app files written. src/Content.js is the main screen.
    All imports are valid relative paths. All features work. DONE.
  agent: builder
  context: [plan_requirements]

debug_runtime_logic:
  description: >-
   0. CONTEXT ISOLATION: Use only file_reader results. Do not rely on previous task output.
   1. Use file_reader to read src/Content.js first.
   2. ONE tool call per response. Never batch.
   3. Check EVERY local import: verify the file exists, verify export type matches import type.
   4. Rewrite any imports using '../' or 'src/' to use exactly './' (e.g. 'src/Button' becomes './Button').
   5. If an imported file does not exist, CREATE it with file_writer.
   6. Verify all buttons have working onPress handlers.
   7. Verify no raw text outside Text tags.
   8. Verify no invalid styles like '10px'.
   9. Fix unclosed JSX tags and braces.
   10. Add optional chaining (?.) where data access could crash.
   11. Use file_writer to fix any issues found.
   12. Return DONE only after verifying and fixing all files.
  expected_output: >-
    A crash-free codebase with all imports resolved. DONE.
  agent: react_native_debugger
  context: []
