plan_requirements:
  description: >
    From the user's prompt ({content_prompt}), extract features for a MULTI-SCREEN Expo app.
    Constraints:
    - React Native + Expo SDK 54
    - Exactly 3 screens: Home, History, Settings
    - Manual screen switching only (no react-navigation library)
    - Include a distinct top header band and a bottom navbar with icons + labels
    - Respect SafeAreaView layout
    - NO backend/auth/external APIs
    - Keep implementation concise (not oversized files)
    - Minimize external libraries (react + react-native only; allow @react-native-async-storage/async-storage only if persistence is required)
  expected_output: >
    App brief with 3-5 core features, multi-screen flow (Home/History/Settings), and clear UX requirements.
    Must include safe area, distinct header band, and bottom navbar behavior.
  agent: planner

design_architecture:
  description: >
    Design a multi-screen Expo React Native app architecture (6-9 files, 40-120 lines per file).
    Hard constraints:
    - MAIN entry point: App.js at ROOT (typically 60-90 lines)
    - Use manual screen switching with React state (NO navigation libraries)
    - Include exactly 3 screens under src/screens/:
      * HomeScreen.js
      * HistoryScreen.js
      * SettingsScreen.js
    - Include reusable shell components under src/components/:
      * TopHeader component showing current screen name with visual separation from content
      * BottomNavbar component for screen switching with evenly spaced icon+label items
    - Include SafeAreaView in app shell
    - App shell must use full-height flex layout so main content is vertically distributed, not stuck at the top
    - Supporting files under src/:
      * src/screens/: exactly 3 screens (30-80 lines each)
      * src/components/: shared UI (25-70 lines each)
      * src/utils/: helper logic (25-70 lines each)
    - Use React hooks for state management (useState, useReducer, useCallback, useEffect)
    - CRITICAL: ONLY use react and react-native modules
    REQUIRED OUTPUT FORMAT:
    architecture_summary: <description of the multi-screen app>
    external_dependencies: (EMPTY unless persistent storage required, then ONLY @react-native-async-storage/async-storage)
    files:
      - path: (App.js at ROOT; screens at src/screens/X.js; components at src/components/X.js; utils at src/utils/X.js)
        purpose: (clear description)
        size_estimate: (60-90 lines for App.js; 25-80 lines for others)
        exports:
        state/hooks: (which useState/hooks this file uses)
        handlers:
        allowed_imports: (ONLY react and/or react-native, OR @react-native-async-storage/async-storage if in external_dependencies)
    VALIDATION:
      - Must include SafeAreaView usage in App shell
      - Must include TopHeader and BottomNavbar components
      - TopHeader must be visually distinct from content using padding, background, and spacing
      - BottomNavbar must be fixed to the bottom, evenly spaced, and include icon + label for each item
      - App content must use flex layout so it fills available space rather than sticking to the top
      - Must include exactly 3 screens and a screen-switch handler
      - If NO persistent storage: allowed_imports MUST only contain ["react", "react-native"]
      - If persistent storage required: allowed_imports in storage utils CAN include "@react-native-async-storage/async-storage"
      - CRITICAL RULE: NO hallucinated modules like expo/storage, expo/filesystem, expo-sqlite
      - NO navigation, NO other @react-native-* packages, NO external packages except async-storage
      - 7-9 files total
  expected_output: >
    Complete architecture blueprint with 7-9 files, multi-screen flow (Home/History/Settings), safe-area shell,
    header + navbar components, compact line counts, and no invalid dependencies.
  agent: architect
  context: [plan_requirements]

implement_mvp_features:
  description: >
    Implement the architecture blueprint (6-9 files, compact reliable code).
    Hard rules:
    - Create ONLY files listed in architecture.files and in specified quantities
    - JSX only (no TypeScript/TSX)
    - App.js at ROOT; screens/components/utilities at src/ paths
    - Write complete, production-quality code:
      * App.js: 60-90 lines (app shell + safe area + screen state)
      * Screens: 30-80 lines each
      * Components: 25-70 lines each
      * Utils: 25-70 lines each
    - NO skeleton code or TODOs. Everything must work as written.
    - CRITICAL: For each file, use ONLY imports in allowed_imports.
      Before writing each file, verify every import is whitelisted.
      FORBIDDEN: expo/storage (does not exist), expo-sqlite, expo/filesystem, react-navigation
      ALLOWED EXCEPTION: @react-native-async-storage/async-storage if in architecture.external_dependencies
      RULE: If import not in allowed_imports, do NOT use it. Do NOT hallucinate modules.
    - Use React hooks (useState, useEffect, useCallback, useReducer) for state
    - App shell MUST include SafeAreaView, distinct header band, and bottom navbar
    - Bottom navbar must use evenly spaced icon + label items
    - App content must use flex to distribute space vertically across the screen
    - Implement manual screen switching via state (no nav library)
    - Proper styling (StyleSheet), event handlers, UI polish
    - Do not add features beyond architecture
    Tool usage:
    1) Use file_writer for one file at a time
    2) For path "App.js" write to root; for path "src/*" write to that location
    3) Use file_reader only if needed
    4) Do NOT call track_dependency (architecture.external_dependencies is already set and complete)
    5) Do not output code in chat; only use file_writer
    6) CRITICAL: Validate every import against allowed_imports before writing code
    7) If persistent storage used, create src/utils/storage.js with all AsyncStorage logic
    8) Keep each file payload compact (<~90 lines) to avoid tool-call JSON failures
    9) If a feature needs too much code, split logic into an additional helper file listed in architecture
    10) NEVER output markdown/json fences before tool calls; send direct tool calls only
    Final response after all tool calls: DONE
  expected_output: >
    Implemented 6-9 files: App.js at root with safe-area shell and screen state,
    screens/components/utils with compact sizes, all imports verified,
    external_dependencies honored (empty or just async-storage),
    no invalid dependencies, polished multi-screen UX with header + navbar, final response DONE.
  agent: feature_builder
  context: [design_architecture]

