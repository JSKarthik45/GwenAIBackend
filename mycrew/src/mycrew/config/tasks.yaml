plan_requirements:
  description: >
    From the user's prompt ({content_prompt}), extract ONLY essential MVP features.
    Target JSX implementation in src/ folder for Expo SDK 54. Identify core screens, UI flows, and basic state needed.
    Ensure all features are testable in Expo Go.
    NO extra features, NO performance optimizations, NO nice-to-haves.
  expected_output: >
    Concise MVP brief for JSX: core features only, screens/flows, basic state model.
    Bullet points only. Keep it SHORT. All features must work in Expo Go.
  agent: planner

design_architecture:
  description: >
    Design MINIMAL MVP file structure—ONLY 5-6 essential files maximum.
    NO Redux, NO sagas, NO complex patterns. Use React useState/useContext only.
    JSX files only - NO TypeScript, NO TSX.
    Keep EVERY file under 400 lines and 8KB (for Groq compatibility).
    For EACH file, specify:
      - File path (simple structure: src/screens/, src/components/, src/contexts/ only)
      - One-sentence purpose
      - Required exports
      - State/props (simple types only: arrays, strings, booleans)
      - Required dependencies on other files
      - 2-3 key handlers/callbacks only
    External libraries: NOTE ONLY Expo SDK basics + minimal external (react-navigation, AsyncStorage only).
  expected_output: >
    Concise file list (5-6 files MAX). Each entry: "src/screens/HomeScreen.js - Main todo list. Exports: HomeScreen. State: [todos]. Handlers: addTodo, toggleTodo. Deps: TodoContext."
    Include external libs list.
  agent: architect
  context: [plan_requirements]

implement_mvp_features:
  description: >
    Implement ONLY essential MVP src/ files from the architecture plan.
    CRITICAL SIZE CONSTRAINT: Keep EVERY file UNDER 400 lines and UNDER 8KB.
    LLM LIMITATION: Groq has strict tool payload limits. WRITE MINIMAL CODE:
      - NO verbose comments, NO complex inline logic
      - Core functionality only: render + simple state/handlers
      - Inline styles (1-2 StyleSheets max), NO separate theme files
      - Import ONLY what you use, NO unused imports
      - Short function/variable names (2-3 words max)
      - NO Redux, sagas, or complex state management (use React useState/useContext only)
    For EACH file:
      1. Write MINIMAL but COMPLETE code (no stubs)
      2. Include all required exports from the spec
      3. Use file_writer for ONE file at a time
      4. Track libraries with track_dependency (name only)
    JSX ONLY - no TypeScript. Ensure valid JSON for tool args. One tool call per turn.
    NEVER modify app.js, App.jsx, or root files.
    Do not explain—proceed directly to file_writer tool calls.
  expected_output: >
    All MVP src/ files in minimal, Groq-safe JSX (each <400 lines, <8KB). Every required export and handler present but concisely implemented. Ready for Expo Go testing.
  agent: feature_builder
  context: [design_architecture]

