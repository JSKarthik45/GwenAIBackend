plan_requirements:
  description: >
    From the user's prompt ({content_prompt}), extract features for CONTENT inside a prebuilt MULTI-SCREEN Expo shell.
    Constraints:
    - React Native + Expo SDK 54
    - Exactly 2 screens: Home and Settings
    - Navigation shell already exists in template (SafeAreaView + header + bottom navbar)
    - Focus only on what appears inside Home and Settings content areas
    - Prioritize the most important MVP outcomes first: must-have value before nice-to-have extras
    - Rank features by user impact and implementation feasibility for an MVP
    - Include MORE features than minimal mode: target 6-9 concrete features while preserving MVP focus
    - Avoid feature bloat by keeping only high-value features that materially improve user success
    - For each feature, define implementation details so coding can be done correctly on first pass
    - Feature planning must include required user inputs, validation rules, state transitions, and expected behavior
    - NO backend/auth/external APIs
    - Keep implementation concise (not oversized files)
    - Prioritize extremely premium UI/UX quality: modern aesthetics, vibrant colors, ample padding, clear hierarchy, readable typography, and intuitive interactive elements (buttons that provide feedback).
    - Ensure every interactive element (button, pressable) is explicitly planned with working state handlers.
    - Minimize external libraries (react + react-native only; allow @react-native-async-storage/async-storage only if persistence is explicitly required by the user)
    - Do NOT use third-party libraries like moment/date-fns/dayjs or any other external packages
    - Do NOT include persistence by default; only add persistence if the prompt explicitly asks to keep data across launches
    - Do NOT use Picker (react-native Picker is deprecated and requires an external package)
    - Use built-in controls only (e.g., Pressable, Switch, Button) for settings choices
    - Content must be specific to the current prompt; do NOT reuse or reference prior app themes
    - Do NOT leave template placeholder text in Home/Settings content
    - Do NOT leave empty useEffect blocks or stub handlers; implement real logic
    - Do NOT render Text as a button; use Pressable or Button for interactions
  expected_output: >
    Detailed MVP feature spec with 6-9 features and clear Home/Settings content behavior.
    REQUIRED OUTPUT FORMAT:
    feature_plan:
      - feature_name:
        priority: (P1/P2/P3)
        user_value:
        target_screen: (Home/Settings/Both)
        required_inputs: (fields, types, defaults)
        processing_logic: (how inputs are transformed and used)
        validation_rules: (required, ranges, formats, edge checks)
        interaction_flow: (tap/input/result sequence)
        ui_states: (initial/empty/loading/success/error)
        persistence_needs: (none or storage keys/shape)
        implementation_notes: (content/shared/utils placement)
        acceptance_criteria: (testable pass conditions)
    Must include feature priority order (P1/P2/P3), user value rationale, and acceptance criteria for each feature.
    Must respect that navigation/header/safe area are prebuilt in template and not regenerated.
  agent: planner

design_architecture:
  description: >
    Design a content-layer Expo architecture (6-14 files, 25-110 lines per file) for a prebuilt template shell.
    Hard constraints:
    - Template provides root App.js, SafeAreaView, header, and bottom navbar
    - DO NOT redesign or regenerate navigation shell files
    - Content entry files must be:
      * src/HomeContent.js
      * src/SettingsContent.js
    - Supporting files MUST also be placed directly in src/ (no subfolders!):
      * e.g., src/Button.js, src/storage.js
    - Use React hooks for state management (useState, useReducer, useCallback, useEffect)
    - Design for a stunning, premium UX: use modern styling, vibrant colors, shadows, border-radius, and glassmorphism where appropriate.
    - Architecture must guarantee reliable behavior for all P1 features from the plan
    - FATAL ERROR PREVENTION (MODULE RESOLUTION): You MUST explicitly map out the exact import statements that each file will use. You MUST guarantee that all file paths (relative only) and export names (named vs default) exactly match between files.
    - Define clear state ownership, data flow, and edge-case handling for each feature
    - Prefer maintainable, testable, and readable structure over clever complexity
    - CRITICAL: ONLY use react and react-native modules
    - Do NOT include persistence unless explicitly required by the user prompt
    - Do NOT use Picker; build settings controls with Pressable/Switch/Button only
    - Do NOT use third-party libraries like moment/date-fns/dayjs or any other external packages
    - Architecture must match the current prompt; no leftover features from previous prompts
    - Do not include files that are not used by HomeContent or SettingsContent
    REQUIRED OUTPUT FORMAT:
    architecture_summary: <description of Home/Settings content behavior inside template shell>
    shared_state_contract:
      owner: (Home/Settings/Both)
      variables:
        - name:
          type:
          default:
          updated_by: (Home/Settings/Both)
          consumed_by: (Home/Settings/Both)
          persistence_key: (none or storage key)
          invariants: (validation and allowed transitions)
      integration_rules:
        - rule:
          rationale:
    external_dependencies: (EMPTY unless persistent storage is explicitly required, then ONLY @react-native-async-storage/async-storage)
    files:
      - path: (MUST be src/X.js - NO subfolders)
        purpose: (clear description)
        size_estimate: (20-110 lines per file)
        exports:
        state/hooks: (which useState/hooks this file uses)
        handlers:
        allowed_imports: (ONLY react and/or react-native, OR @react-native-async-storage/async-storage if in external_dependencies)
        local_import_paths: (ONLY relative paths like ./foo or ../shared/foo; never src/...)
    VALIDATION:
      - Must include exactly 2 content files: src/HomeContent.js and src/SettingsContent.js
      - Must NOT include App.js, index.js, src/components/TopHeader.js, or src/components/BottomNavbar.js
      - Must not define navigation state or screen-switch handlers (template handles navigation)
      - Agent may add shared files directly in src/ when functionality is reused across pages
      - Shared modules must be imported consistently by both pages when applicable
      - Architecture must ensure no page references missing exports, handlers, or helpers
      - All local file imports MUST use same-folder relative paths (e.g. './Button'), because all files are in src/
      - Every local import path must resolve to an existing file in architecture.files
      - FATAL ERROR PREVENTION: Prevent unresolved imports by absolutely ensuring exact spelling of relative paths and matching named/default exports.
      - shared_state_contract must include all cross-screen variables and ownership semantics
      - Every planned P1 feature must map to concrete handlers/state in architecture
      - Architecture must include empty/loading/error/validation UI behavior where relevant
      - Architecture must map all planned features to files (Home/Settings/shared/utils) without orphaned feature logic
      - Prefer shared modules for reusable feature logic to reduce breakage across pages
      - If NO persistent storage: allowed_imports MUST only contain ["react", "react-native"]
      - If persistent storage required: allowed_imports in storage utils CAN include "@react-native-async-storage/async-storage"
      - If persistence is NOT explicitly required: do not include src/storage.js at all
      - Never create unused shared/utils files; every generated file must be imported by HomeContent or SettingsContent
      - Do not use Picker from react-native; no external picker packages
      - No placeholder comments or TODOs in generated code
      - No third-party libraries like moment/date-fns/dayjs in any file
      - Home/Settings content must reflect the current prompt domain only
      - No template placeholder text in Home/Settings content
      - No empty useEffect blocks or stub handlers in Home/Settings
      - No Text-as-button interactions; use Pressable/Button only
      - No unused files; every file in architecture.files must be imported by HomeContent or SettingsContent
      - CRITICAL RULE: NO hallucinated modules like expo/storage, expo/filesystem, expo-sqlite
      - NO navigation, NO other @react-native-* packages, NO external packages except async-storage
      - 6-14 files total
  expected_output: >
    Complete content-layer blueprint with 6-14 files focused on Home/Settings content,
    template shell preserved, robust feature mapping, and no invalid dependencies.
    Blueprint must fully cover all planned features with concrete implementation paths,
    including an explicit shared_state_contract for variables used across Home and Settings.
  agent: architect
  context: [plan_requirements]

implement_home_screen:
  description: >
    Implement Home first using the architecture blueprint and shared_state_contract.
    Home phase scope:
    - src/HomeContent.js
    - any required shared/utils files (all placed directly in src/) needed by Home and later Settings
    - DO NOT write src/SettingsContent.js in this phase
    Hard rules:
    - Create ONLY files listed in architecture.files and in specified quantities
    - JSX only (no TypeScript/TSX)
    - Write only files directly under src/ (NO subfolders)
    - Write complete, production-quality code:
      * Content files: 25-110 lines each
      * Shared/utils files: 20-100 lines each
    - NO skeleton code or TODOs. Everything must work as written.
    - Implement all Home-targeted planned features completely end-to-end (UI + state + handlers)
    - Establish shared_state_contract variables exactly as designed by architect
    - If logic/UI is reused across pages, extract shared modules with stable exports for Settings phase
    - CRITICAL: For each file, use ONLY imports in allowed_imports.
      Before writing each file, verify every import is whitelisted.
      FORBIDDEN: expo/storage (does not exist), expo-sqlite, expo/filesystem, react-navigation
      ALLOWED EXCEPTION: @react-native-async-storage/async-storage if in architecture.external_dependencies
      RULE: If import not in allowed_imports, do NOT use it. Do NOT hallucinate modules.
    - Local file imports MUST be relative (./ or ../) and must resolve to existing files.
    - NEVER use local alias imports like "src/shared/..." or "src/utils/..." in generated code.
    - Use React hooks (useState, useEffect, useCallback, useReducer) for content state
    - Implement premium styling (StyleSheet) with modern design aesthetics (vibrant colors, generous padding, rounded corners, shadows). Ensure the app does not look bad or basic.
    - Ensure all buttons and interactive elements work perfectly with wired-up onPress handlers.
    - Ensure content layout looks refined on both common phone sizes and larger devices
    - FATAL ERROR PREVENTION (MODULE RESOLUTION): Before declaring DONE, you must guarantee that every single local import path is relative (./ or ../) and the imported file actually exports that exact symbol name/default. Module resolve errors are unacceptable.
    - CRITICAL: Never place raw text outside of a <Text> component (this causes instant crashes).
    - CRITICAL: Ensure perfect JSX syntax. All braces {} and tags < /> MUST be properly closed (e.g. <Component prop={value} />).
    - CRITICAL: Use valid React Native styles (e.g., use numbers instead of 'px' strings for padding/margin).
    - Add robust guardrails in UI behavior: empty states, input validation feedback, and failure-safe interactions where needed
    - Keep interactions snappy and predictable; avoid ambiguous controls
    - MUST preserve template shell/navigation files unchanged:
      * App.js
      * index.js
    - Do not add features beyond architecture
    Tool usage:
    1) Use file_writer for one file at a time
    1.0) NEVER call file_writer more than once in a single response
    1.0.1) If 5 files remain, use 5 separate interaction turns
    1.1) Emit exactly one file_writer call per assistant response
    1.2) After each write, wait for tool completion before the next file_writer call
    1.3) Never batch multiple file_writer calls in one response or payload
    1.4) Never send multi-file arrays/objects to file_writer
    1.5) Process architecture.files as a strict loop:
      - Step A: Validate file imports against allowed_imports
      - Step B: Write that single file with file_writer
      - Step C: Wait for SUCCESS confirmation from tool output
      - Step D: Move to next file only after SUCCESS
    2) Write only to "src/*" paths (no subfolders allowed)
    3) Use file_reader only if needed
    4) Do NOT call track_dependency (architecture.external_dependencies is already set and complete)
    5) Do not output code in chat; only use file_writer
    6) CRITICAL: Validate every import against allowed_imports before writing code
    6.1) Validate every local import path is relative (usually just ./) and file-resolvable
    7) If persistent storage used, create src/storage.js with all AsyncStorage logic
    7.1) If persistence is not explicitly required, do NOT create storage utils or import them
    7.2) Do not create unused shared/utils files; every file must be imported by HomeContent or SettingsContent
    7.3) Ensure every local import has a matching export (named vs default) in the target file
    7.4) Do not import local modules unless you will write them before returning DONE
    7.5) Do NOT use Picker; use Pressable/Switch/Button-based controls
    7.6) Do NOT import third-party libraries like moment/date-fns/dayjs
    7.7) Home/Settings content MUST be aligned to the current prompt only
    7.8) Remove any template placeholder copy from Home/Settings content
    7.9) Do not leave empty useEffect blocks or stub handlers
    7.10) Do not use Text as a button; use Pressable or Button
    8) Keep each file payload compact (<~90 lines) to avoid tool-call JSON failures
    9) If a feature needs too much code, split logic into additional shared/helper files listed in architecture
    10) NEVER output markdown/json fences before tool calls; send direct tool calls only
    11) Task is invalid if assistant returns narrative text without required file_writer calls.
    12) Required successful writes for completion:
      - src/HomeContent.js
      - plus any files imported by HomeContent.js
    13) CRITICAL FAILURE RULE: Do not return DONE until every Home-phase file in architecture.files is written or confirmed unnecessary by zero imports.
    14) NO BATCHING RULE: You are strictly forbidden from calling a tool more than once per response.
        If multiple files are needed, write exactly one file per response and wait for success before the next file.
    15) COMPLETE JSON RULE: When calling file_writer, provide the full valid payload including the target path and the complete file content.
        Never emit a shorthand path, bracketed filename, or partial tool argument.
    Final response after all tool calls: DONE
  expected_output: >
    Implemented Home phase files (Home content plus shared foundations),
    shared_state_contract established for cross-screen reuse,
    template shell preserved unchanged, all imports verified,
    external_dependencies honored (empty or just async-storage),
    no invalid dependencies, polished Home UX, final response DONE.
  agent: home_screen_builder
  context: [design_architecture]

