plan_requirements:
  description: >
    From the user's prompt ({content_prompt}), extract features for a SINGLE-SCREEN Expo app.
    Constraints:
    - React Native + Expo SDK 54
    - All features on ONE screen (NO navigation, tabs, or multiple screens)
    - NO backend/auth/external APIs
    - Aim for moderate complexity: several coordinated features, richer UX
    - Minimize external libraries (react + react-native only)
  expected_output: >
    App brief with 4-6 interrelated features, single screen flow, richer UX elements.
    Mention that navigation, multiple screens, and advanced integrations are out of scope.
  agent: planner

design_architecture:
  description: >
    Design a single-screen Expo React Native app architecture (5-7 files, 150-400 lines per file).
    Hard constraints:
    - MAIN entry point: App.js at ROOT (typically 300-400 lines for main state/UI)
    - 4-6 supporting files under src/:
      * src/components/: Reusable UI components (100-200 lines each)
      * src/utils/: Helper functions, logic (100-150 lines each)
    - NO navigation, NO tabs, NO multiple screens
    - All features coordinated on single screen
    - Use React hooks for state management (useState, useReducer, useCallback, useEffect)
    - CRITICAL: ONLY use react and react-native modules
    REQUIRED OUTPUT FORMAT:
    architecture_summary: <description of the single-screen app>
    external_dependencies: (MUST BE EMPTY - no external packages for this architecture)
    files:
      - path: (App.js at ROOT; components at src/components/X.js; utils at src/utils/X.js)
        purpose: (clear description)
        size_estimate: (150-400 lines for App.js; 100-250 lines for components/utils)
        exports:
        state/hooks: (which useState/hooks this file uses)
        handlers:
        allowed_imports: (ONLY react and/or react-native)
    VALIDATION:
      - allowed_imports MUST only contain: "react", "react-native"
      - NO external_dependencies
      - NO navigation, NO @react-native-* packages, NO expo/storage
      - 5-7 files total
  expected_output: >
    Complete architecture blueprint with 5-7 files, proper code organization,
    estimated line counts, state flow, and no external dependencies.
  agent: architect
  context: [plan_requirements]

implement_mvp_features:
  description: >
    Implement the architecture blueprint (5-7 files, substantial code).
    Hard rules:
    - Create ONLY files listed in architecture.files and in specified quantities
    - JSX only (no TypeScript/TSX)
    - App.js at ROOT; components and utilities at src/ paths
    - Write complete, production-quality code:
      * App.js: 300-400 lines typical (main state, orchestration, central UI)
      * Components: 100-250 lines each (reusable UI building blocks)
      * Utils: 100-150 lines each (logic, helpers, formatters)
    - NO skeleton code or TODOs. Everything must work as written.
    - CRITICAL: For each file, use ONLY imports in allowed_imports.
      Before writing each file, verify every import is whitelisted.
      FORBIDDEN: expo/storage, expo-sqlite, react-navigation, @react-native-*
    - Use React hooks (useState, useEffect, useCallback, useReducer) for state
    - Proper styling (StyleSheet), event handlers, UI polish
    - Do not add features beyond architecture
    Tool usage:
    1) Use file_writer for one file at a time (write substantial code per file)
    2) For path "App.js" write to root; for path "src/*" write to that location
    3) Use file_reader only if needed
    4) Do NOT call track_dependency (architecture.external_dependencies is empty)
    5) Do not output code in chat; only use file_writer
    Final response after all tool calls: DONE
  expected_output: >
    Implemented 5-7 files: App.js at root with main state/UI (300-400 lines),
    supporting components and utilities (100-250 lines each), all imports verified,
    no external dependencies, production-quality working code, final response DONE.
  agent: feature_builder
  context: [design_architecture]

